<html>
<html>
<head>
    <title>PAN Card Application</title>
</head>
<body bgcolor="Pink">

    <h3 align="center">PAN CARD APPLICATION</h3>

    <form>
        <fieldset>
            <legend>Application Details</legend>
            
            Title:
            <select>
                <option>Shri</option>
                <option>Smt</option>
                <option>Kumari</option>
                <option>Kumar</option>
            </select>
            <br><br>

            Last Name: <input type="text"><br>
            First Name: <input type="text"><br>
            Middle Name: <input type="text"><br>
            <br>

            Date of Birth: <input type="date"><br><br>

            Gender:
            <input type="radio" name="g"> Male
            <input type="radio" name="g"> Female
        </fieldset>

        <br>

        <fieldset>
            <legend>Contact Details</legend>
            
            Mobile Number: <input type="text"><br>
            Email ID: <input type="email"><br>
            Address:<br>
            <textarea rows="3" cols="30"></textarea>
        </fieldset>

        <br>

        <fieldset>
            <legend>Documents Submitted</legend>
            
            <input type="checkbox"> Aadhaar Card<br>
            <input type="checkbox"> Passport<br>
            <input type="checkbox"> Voter I.D
        </fieldset>

        <br>

        <input type="submit" value="Submit">
        <input type="reset" value="Clear">
    </form>

</body>
</html>
